<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONFIDENTIAL REPORT - 系统诊断报告</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.75);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-blue: #3b82f6;
            --accent-green: #10b981;
            --accent-yellow: #f59e0b;
            --alert-red: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem 1.5rem;
            background-image: radial-gradient(circle at 50% 50%, rgba(59, 130, 246, 0.05) 0%, transparent 80%);
            line-height: 1.5;
        }

        .glass-container {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 2.5rem;
            max-width: 480px;
            width: 100%;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
        }

        .alert-header {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .pulse-badge {
            width: 10px;
            height: 10px;
            background-color: var(--alert-red);
            border-radius: 50%;
            position: relative;
        }

        .pulse-badge::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--alert-red);
            border-radius: 50%;
            animation: pulse 2s infinite ease-out;
            z-index: -1;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(3.5); opacity: 0; }
        }

        .alert-title {
            font-size: 1.4rem;
            font-weight: 800;
            letter-spacing: 0.05em;
            background: linear-gradient(135deg, #fff 0%, #94a3b8 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        .intro-text {
            color: var(--text-secondary);
            font-size: 0.95rem;
            line-height: 1.7;
            margin-bottom: 2rem;
        }

        .module-group {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .module-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 1.25rem 1.5rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .module-card:hover {
            transform: scale(1.02);
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.15);
        }

        .module-card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 4px;
            opacity: 0.8;
        }

        .module-lao::before { background-color: var(--accent-blue); }
        .module-gao::before { background-color: var(--accent-green); }
        .module-hao::before { background-color: var(--accent-yellow); }

        .module-title {
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 0.4rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .module-lao .module-title { color: var(--accent-blue); }
        .module-gao .module-title { color: var(--accent-green); }
        .module-hao .module-title { color: var(--accent-yellow); }

        .module-id {
            font-size: 0.75em;
            opacity: 0.6;
            font-weight: normal;
        }

        .module-content {
            color: var(--text-primary);
            font-size: 0.9rem;
            letter-spacing: 0.02em;
            opacity: 0.85;
        }

        .footer-icons {
            margin-top: 2.5rem;
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            opacity: 0.6;
        }

        .floating-icon {
            font-size: 1.2rem;
            animation: float 3s ease-in-out infinite;
        }

        .floating-icon:nth-child(2) {
            animation-delay: 1.5s;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }

        @media (max-width: 480px) {
            .glass-container {
                padding: 1.5rem;
            }
            .alert-title {
                font-size: 1.1rem;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            .pulse-badge::after,
            .floating-icon {
                animation: none;
            }
            .module-card {
                transition: none;
            }
        }
    </style>
</head>
<body>

<div class="glass-container" role="article" aria-labelledby="alert-title">
    <header class="alert-header">
        <div class="pulse-badge" aria-hidden="true"></div>
        <h1 class="alert-title" id="alert-title">Confidential Analysis</h1>
    </header>

    <p class="intro-text">
        <strong>系统扫描报告：</strong> 发现目标生理与心理指标异常。经大数据比对，该个体已被确诊为"晚期快乐综合征"，具体特征如下：
    </p>

    <div class="module-group" role="list">

        <article class="module-card module-lao" role="listitem">
            <h2 class="module-title">
                核心特征: 三捞
                <span class="module-id">ID: A-092</span>
            </h2>
            <div class="module-content">
                情商捞 · 智商捞 · 经商捞
            </div>
        </article>

        <article class="module-card module-gao" role="listitem">
            <h2 class="module-title">
                生理指标: 三高
                <span class="module-id">ID: B-441</span>
            </h2>
            <div class="module-content">
                高血压 · 高血脂 · 高血糖
            </div>
        </article>

        <article class="module-card module-hao" role="listitem">
            <h2 class="module-title">
                行为模式: 三好
                <span class="module-id">ID: C-702</span>
            </h2>
            <div class="module-content">
                好玩 · 好吃 · 好睡
            </div>
        </article>

    </div>

    <footer class="footer-icons" aria-hidden="true">
        <span class="floating-icon">⚠️</span>
        <span class="floating-icon">🔒</span>
        <span class="floating-icon">☣️</span>
    </footer>

</div>

</body>
</html>
